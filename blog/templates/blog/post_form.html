{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Post - Me Log</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <div class="container">
        <article>
            <h2>Edit Post: {{ post.title }}</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" style="margin-top: 15px;">Save Changes</button>
            </form>
            <p style="margin-top: 20px;"><a href="{% url 'post_detail' post.pk %}">Cancel</a></p>
        </article>
    </div>
</body>
</html>
