{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Me Log</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; margin-bottom: 40px;">Welcome to My Blog</h1>

        {% for post in posts %}
            <article>
                <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
                <p><small>Published on: {{ post.created_on|date:"F j, Y" }}</small></p>

                {% if post.image %}
                    <img src="{{ post.image.url }}" alt="{{ post.title }}">
                {% endif %}

                <p>{{ post.content|truncatewords:30 }}</p> </article>
        {% empty %}
            <p>No posts yet! Go to the admin dashboard to add one.</p>
        {% endfor %}
    </div>
</body>
</html>
