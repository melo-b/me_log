{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Post - Me Log</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <div class="container">
        <article style="text-align: center;">
            <h2>Are you sure you want to delete "{{ post.title }}"?</h2>
            <p style="color: red;">This action cannot be undone.</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" style="background-color: #d9534f; margin-top: 20px;">Yes, Delete Post</button>
            </form>
            <p style="margin-top: 20px;"><a href="{% url 'post_detail' post.pk %}">Cancel</a></p>
        </article>
    </div>
</body>
</html>
