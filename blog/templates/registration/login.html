{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log In - Me Log</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>
    <div class="container">
        <article style="max-width: 400px; margin: 40px auto; text-align: center;">
            <h2>Log In</h2>
            
            {% if form.errors %}
                <p style="color: red;">Your username and password didn't match. Please try again.</p>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" style="width: 100%; margin-top: 10px;">Log In</button>
            </form>
            
            <p style="margin-top: 20px;"><a href="{% url 'blog_index' %}">&larr; Back to Home</a></p>
        </article>
    </div>
</body>
</html>
